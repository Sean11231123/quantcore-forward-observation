name: E2 Unified Forward Logger

on:
  workflow_dispatch:
    inputs:
      exchange:
        description: "Manual diagnostic exchange mode. Scheduled production always defaults to bybit."
        required: false
        default: "bybit"
        type: choice
        options:
          - bybit
          - binance
          - both
  push:
    branches:
      - main
    paths:
      - "scripts/e2_*.py"
      - ".github/workflows/e2_forward_logger.yml"
  schedule:
    - cron: "5 * * * *"

jobs:
  log-forward-data-layer1:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run E2 crypto derivatives forward logger
        continue-on-error: true
        env:
          E2_EXCHANGE: ${{ github.event_name == 'workflow_dispatch' && inputs.exchange || 'bybit' }}
        run: |
          python scripts/e2_forward_logger.py --exchange "$E2_EXCHANGE"

      - name: Run E2 crypto derivatives health check
        run: |
          python scripts/e2_health_check.py --hours 24

      - name: Run E2 unified health check
        run: |
          python scripts/e2_unified_health_check.py --hours 24

      - name: Commit E2 forward data
        run: |
          git config user.name "quantcore-bot"
          git config user.email "quantcore-bot@users.noreply.github.com"
          git add -f data/forward/crypto_derivatives/funding/*.csv || true
          git add -f data/forward/crypto_derivatives/open_interest/*.csv || true
          git add -f data/forward/crypto_derivatives/mark_index_premium/*.csv || true
          git add -f data/forward/crypto_derivatives/health/*.csv || true
          git add -f data/forward/health/*.txt || true
          git diff --cached --quiet || git commit -m "Update E2 derivatives forward logs"
          git push
