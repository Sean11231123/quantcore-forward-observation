name: V12 Forward Observation

on:
  workflow_dispatch:
  # schedule sync bump
  schedule:
    - cron: "7,22,37,52 * * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run V12 scan once
        env:
          BINANCE_TESTNET_KEY: ${{ secrets.BINANCE_TESTNET_KEY }}
          BINANCE_TESTNET_SECRET: ${{ secrets.BINANCE_TESTNET_SECRET }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_COMMENT_CHAT_ID: ${{ secrets.TG_COMMENT_CHAT_ID }}
          TG_COMMENT_THREAD_ID: ${{ secrets.TG_COMMENT_THREAD_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/run_v12_scan_once.py

      - name: Send workflow dispatch heartbeat
        if: github.event_name == 'workflow_dispatch'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python scripts/send_telegram_heartbeat.py

      - name: Process Telegram review updates
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          REVIEW_ALLOWED_USER_IDS: ${{ secrets.REVIEW_ALLOWED_USER_IDS }}
        run: |
          python scripts/telegram_review_poll_once.py

      - name: Commit updated local signal log
        run: |
          git config user.name "quantcore-bot"
          git config user.email "quantcore-bot@users.noreply.github.com"
          git add logs/v12_signals.csv || true
          git add logs/v12_observation_heartbeat.csv || true
          # runtime_errors.log is optional; most valid no-signal scans do not create it.
          if [ -f logs/runtime_errors.log ]; then
            git add logs/runtime_errors.log
          else
            echo "logs/runtime_errors.log not present; skipping optional runtime error log"
          fi

          if git diff --cached --quiet; then
            echo "No V12 forward log changes to commit"
            exit 0
          fi

          git commit -m "Update V12 forward logs"

          for attempt in 1 2 3; do
            if git push; then
              echo "git push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "git push failed on attempt ${attempt}"
            sleep 10
          done

          echo "git push failed after 3 attempts"
          exit 1
