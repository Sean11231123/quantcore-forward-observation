name: V12 Forward Observation

on:
  workflow_dispatch:
  # schedule sync bump
  schedule:
    - cron: "7,22,37,52 * * * *"

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run V12 scan once
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TG_COMMENT_CHAT_ID: ${{ secrets.TG_COMMENT_CHAT_ID }}
          TG_COMMENT_THREAD_ID: ${{ secrets.TG_COMMENT_THREAD_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python scripts/run_v12_scan_once.py

      - name: Send workflow dispatch heartbeat
        if: github.event_name == 'workflow_dispatch'
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python scripts/send_telegram_heartbeat.py

      - name: Process Telegram review updates
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          REVIEW_ALLOWED_USER_IDS: ${{ secrets.REVIEW_ALLOWED_USER_IDS }}
        run: |
          python scripts/telegram_review_poll_once.py

      - name: Commit updated local signal log
        run: |
          git config user.name "quantcore-bot"
          git config user.email "quantcore-bot@users.noreply.github.com"
          git add logs/v12_signals.csv || true
          git add logs/runtime_errors.log || true
          git diff --cached --quiet || git commit -m "Update V12 forward logs"
          git push
